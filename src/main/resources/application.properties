# Veri tabanı bağlantı adresi (PostgreSQL varsayılan portu 5432'dir, db_ogrenci adında bir DB oluşturduğunu varsayalım)
spring.datasource.url=jdbc:postgresql://localhost:5432/db_ogrenci

# Veri tabanı kullanıcı adı ve şifresi (Kendi DBeaver/Postgres bilgilerini yazmalısın)
spring.datasource.username=postgres
spring.datasource.password=306541

# Hibernate Ayarları: Tablo yoksa otomatik oluştursun, varsa dokunmasın (update)
spring.jpa.hibernate.ddl-auto=update

# Konsolda çalışan SQL sorgularını görmemizi sağlar
spring.jpa.show-sql=true